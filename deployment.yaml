apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-degree
spec:
  replicas: 2
  selector:
    matchLabels:
    app: student-degree
  template:git
    metadata:
    labels:
    app: student-degree
    spec:
    containers:
    - name: student-degree-container
    image: kalyanram0906/html-demo:latest
    ports:
    - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: student-results-service
spec:
  type: NodePort
  selector:
    app: student-degree
  ports:
    - port: 80
    targetPort: 80
    nodePort: 32765
